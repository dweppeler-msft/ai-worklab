          de: "Du hast einen cleveren Workaround für ein wiederkehrendes Problem gebaut. Kolleg:innen sollen das künftig selbst nutzen können – ohne dich jedes Mal zu fragen.",
          en: "You built a clever workaround for a recurring problem. Colleagues should be able to use it themselves – without asking you every time."
        },
        question: { de: "Wie erstellst du gute Doku?", en: "How do you create good documentation?" },
        options: [
          { de: "Mündlich an die Kolleg:innen weitergeben, die das brauchen.",
            en: "Pass it on verbally to the colleagues who need it." },
          { de: "KI eine fertige Doku schreiben lassen und direkt veröffentlichen – KI ist ja im Schreiben gut.",
            en: "Have AI write a finished doc and publish it directly – AI is good at writing." },
          { de: "Du schreibst Rohtext + machst Screenshots → KI strukturiert in Schritte, ergänzt Vorbedingungen → du fügst Edge Cases und »Was wenn schief geht« hinzu.",
            en: "You write raw text + take screenshots → AI structures it into steps, adds prerequisites → you add edge cases and »what if it goes wrong«." }
        ],
        correct: 2,
        reveal: {
          de: "KI strukturiert aus Leylas Rohtext eine **saubere Schritt-für-Schritt-Anleitung mit Screenshots**. Leyla ergänzt die Dinge, die KI nicht wissen kann: typische Fehler, was wenn schief geht, interne Besonderheiten. **Doku, die Kolleg:innen wirklich nutzen.**",
          en: "AI structures Leyla's raw text into a **clean step-by-step guide with screenshots**. Leyla adds what AI can't know: typical errors, what if things go wrong, internal specifics. **Documentation that colleagues actually use.**"
        },
        takeaway: {
          de: "KI strukturiert und formatiert. Das Erfahrungswissen kommt von dir – das macht den Unterschied zwischen mittelmäßiger und richtig guter Doku.",
          en: "AI structures and formats. The experiential knowledge comes from you – that's what separates mediocre from really good docs."
        }

];

/* =========================
   State + Routing
   ========================= */
const state = {
  view: "home",      // home | persona | task | done
  personaId: null,
  taskIdx: 0,
  // per-persona task completion: { personaId: Set(taskIdx) }
  done: {}
};

function markDone(personaId, taskIdx) {
  if (!state.done[personaId]) state.done[personaId] = new Set();
  state.done[personaId].add(taskIdx);
}
function isDone(personaId, taskIdx) {
  return state.done[personaId] && state.done[personaId].has(taskIdx);
}
function countDone(personaId) {
  return state.done[personaId] ? state.done[personaId].size : 0;
}

function render() {
  const view = document.getElementById("view");
  view.innerHTML = "";
  if (state.view === "home") renderHome(view);
  else if (state.view === "persona") renderPersona(view);
  else if (state.view === "task") renderTask(view);
  try { window.scrollTo({ top: 0, behavior: "auto" }); } catch (_) { window.scrollTo(0, 0); }
}

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2), v);
    else if (v !== false && v != null) e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

/* ---- Home ---- */
function renderHome(root) {
  const s = t();
  root.appendChild(el("div", { class: "hero" },
    el("h1", {}, s.heroH1),
    el("p", { class: "sub" }, s.heroSub),
    el("p", {}, el("strong", {}, s.howItWorks)),
    el("ol", {},
      el("li", {}, s.steps[0]),
      el("li", {}, s.steps[1]),
      el("li", {}, s.steps[2]),
      el("li", {}, s.steps[3]))
  ));

  root.appendChild(el("div", { class: "grid", id: "personaGrid" },
    ...PERSONAS.map(p => {
      const card = el("button", {
        class: "persona-card card",
        onclick: () => { state.personaId = p.id; state.view = "persona"; render(); }
      },
        el("div", { class: "row" },
          el("div", { class: "avatar" }, p.emoji || p.initials),
          el("div", {},
            el("h3", {}, `${p.name}, ${p.age}`),
            el("div", { class: "role" }, tr(p.role))
          )
        ),
        el("div", { class: "meta" },
          el("span", { class: "chip accent" }, tr(p.cluster)),
          el("span", { class: "chip" }, tr(p.path))
        )
      );
      return card;
    })
  ));
}

/* ---- Persona Detail ---- */
function renderPersona(root) {
  const p = PERSONAS.find(x => x.id === state.personaId);
  const s = t();

  root.appendChild(el("button", { class: "back", onclick: () => { state.view = "home"; render(); } },
    s.backToHome));

  root.appendChild(el("div", { class: "card" },
    el("div", { class: "persona-header" },
      el("div", { class: "avatar" }, p.emoji || p.initials),
      el("div", {},
        el("h2", {}, `${p.name}, ${p.age}`),
        el("div", { class: "role" }, `${tr(p.role)} · ${tr(p.path)}`)
      )
    ),
    el("p", { class: "persona-quote" }, `${s.quoteOpen}${tr(p.quote)}${s.quoteClose}`),

    el("div", { class: "tasks" },
      ...p.tasks.map((task, i) => {
        const done = isDone(p.id, i);
        return el("button", {
          class: "task-item" + (done ? " done" : ""),
          onclick: () => { state.taskIdx = i; state.view = "task"; render(); }
        },
          el("div", { class: "task-num" }, done ? "✓" : String(i + 1)),
          el("div", { class: "task-title" }, tr(task.title)),
          el("div", { class: "arrow" }, "›")
        );
      })
    ),

    countDone(p.id) === p.tasks.length
      ? el("div", { class: "reveal", style: "margin-top:18px" },
          el("h4", {}, s.allDone),
          el("p", {}, s.allDoneText(p.name))
        )
      : null
  ));
}

/* ---- Task ---- */
function renderTask(root) {
  const p = PERSONAS.find(x => x.id === state.personaId);
  const task = p.tasks[state.taskIdx];
  const s = t();
  let answered = false;

  root.appendChild(el("button", { class: "back", onclick: () => { state.view = "persona"; render(); } },
    s.backToDay(p.name.split(" ")[0])));

  const persoBar = el("div", { style: "display:flex;align-items:center;gap:10px;margin-bottom:14px;" },
    el("div", { class: "avatar", style: "width:32px;height:32px;font-size:18px;border-radius:999px;background:var(--cp-accent-soft);color:var(--cp-accent);display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1" }, p.emoji || p.initials),
    el("div", { style: "font-size:14px;color:var(--cp-text-muted)" },
      el("strong", { style: "color:var(--cp-text)" }, p.name),
      ` · ${s.taskCount(state.taskIdx + 1, p.tasks.length)}`)
  );
  root.appendChild(persoBar);

  const card = el("div", { class: "card" },
    el("div", { class: "scenario" }, tr(task.scenario)),
    el("p", { class: "question" }, tr(task.question))
  );

  const letters = ["A", "B", "C"];
  const optsWrap = el("div", { class: "options" });
  const optionEls = [];
  task.options.forEach((opt, i) => {
    const oEl = el("button", {
      class: "option",
      onclick: () => choose(i)
    },
      el("div", { class: "letter" }, letters[i]),
      el("div", {}, tr(opt))
    );
    optionEls.push(oEl);
    optsWrap.appendChild(oEl);
  });
  card.appendChild(optsWrap);

  const revealMount = el("div");
  card.appendChild(revealMount);

  const actionsMount = el("div");
  card.appendChild(actionsMount);

  root.appendChild(card);

  function choose(i) {
    if (answered) return;
    answered = true;
    optionEls.forEach((oel, idx) => {
      oel.disabled = true;
      if (idx === task.correct) oel.classList.add("correct");
      else if (idx === i) oel.classList.add("wrong");
    });

    const isRight = i === task.correct;
    const firstname = p.name.split(" ")[0];
    const reveal = el("div", { class: "reveal" },
      el("h4", {}, isRight ? s.correct(firstname) : s.wrong(firstname)),
      el("p", { html: tr(task.reveal) }),
      el("div", { class: "takeaway" }, "💡 " + tr(task.takeaway))
    );
    revealMount.appendChild(reveal);

    markDone(p.id, state.taskIdx);

    const isLast = state.taskIdx === p.tasks.length - 1;
    const actions = el("div", { class: "actions" });
    if (!isLast) {
      actions.appendChild(el("button", {
        class: "btn primary",
        onclick: () => { state.taskIdx++; render(); }
      }, s.nextTask));
    } else {
      actions.appendChild(el("button", {
        class: "btn primary",
        onclick: () => { state.view = "home"; render(); }
      }, s.pickAnother));
    }
    actions.appendChild(el("button", {
      class: "btn",
      onclick: () => { state.view = "persona"; render(); }
    }, s.backToPerson(p.name.split(" ")[0])));
    actionsMount.appendChild(actions);
  }
}

/* ---- UI chrome (brand label + button labels) ---- */
function applyChrome() {
  const s = t();
  document.getElementById("brandLabel").textContent = s.brand;
  document.getElementById("langBtnLabel").textContent = s.langBtnLabel;
  document.getElementById("themeBtnLabel").textContent = s.themeLabel;
  document.getElementById("footerLabel").innerHTML = s.footer;
  document.documentElement.setAttribute("lang", LANG);
  document.title = s.brand;
}

/* ---- Theme + Language toggles ---- */
document.getElementById("themeBtn").addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  document.documentElement.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
});

document.getElementById("langBtn").addEventListener("click", () => {
  LANG = LANG === "de" ? "en" : "de";
  try { localStorage.setItem("aiwl-lang", LANG); } catch (_) {}
  applyChrome();
  render();
});

applyChrome();
render();
</script>
